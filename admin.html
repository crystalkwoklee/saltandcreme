<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T2G0GGM9D7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T2G0GGM9D7');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Salt & Crème admin — owner dashboard.">
  <title>Admin — Salt & Crème</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Admin: same chrome, NOT linked from nav -->
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo" aria-label="Salt & Crème home">
        <span class="seal" aria-hidden="true">S&amp;C</span>
        <span class="site-logo-text"><span class="logo-upright">salt&amp;</span><span class="logo-italic">crème</span></span>
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="pricing.html">Pricing</a>
        <a href="about.html">About</a>
        <a href="blog.html">Journal</a>
        <a href="contact.html">Contact</a>
        <a href="account.html">Account</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- Admin auth — password gate added in Task 9 -->
    <section class="section-sm" id="admin-auth-section">
      <div class="container">
        <p class="text-eyebrow">Owner only</p>
        <h1 class="text-title mt-sm">Admin</h1>
        <form id="admin-login-form" style="margin-top: 2rem; max-width: 32ch; display: flex; flex-direction: column; gap: 1.5rem;">
          <div>
            <label for="admin-email" style="display: block; font-size: 0.88rem; margin-bottom: 0.4rem;">Email</label>
            <input id="admin-email" type="email" name="email" required autocomplete="email" style="width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border-light); border-radius: 3px; font-family: inherit; font-size: 1rem; background: var(--background); color: var(--text-primary);">
          </div>
          <div>
            <label for="admin-password" style="display: block; font-size: 0.88rem; margin-bottom: 0.4rem;">Password</label>
            <input id="admin-password" type="password" name="password" required autocomplete="current-password" style="width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border-light); border-radius: 3px; font-family: inherit; font-size: 1rem; background: var(--background); color: var(--text-primary);">
          </div>
          <p id="admin-error" style="color: #c0392b; font-size: 0.88rem; display: none;">Incorrect email or password.</p>
          <button type="submit" class="btn">Sign in</button>
        </form>
      </div>
    </section>

    <!-- Admin dashboard — hidden until auth added in Task 9 -->
    <section class="section" id="admin-dashboard" hidden aria-label="Admin dashboard">
      <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 3rem;">
          <div>
            <p class="text-eyebrow">Dashboard</p>
            <h2 class="text-title mt-sm">Customer stamps</h2>
          </div>
          <button id="clear-all-stamps" class="btn btn-ghost">Clear all stamps</button>
        </div>

        <!-- Customer list — populated from localStorage in Task 9 -->
        <div id="customer-list" style="display: flex; flex-direction: column; gap: 1rem;">
          <p style="color: var(--text-secondary);">No customers yet.</p>
        </div>

        <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border-light);">
          <h2 class="text-title" style="font-size: 1.4rem;">Journal posts</h2>
          <div id="admin-posts" style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
            <p style="color: var(--text-secondary);">Loading posts…</p>
          </div>
          <button class="btn mt-md" id="new-post-btn">New post</button>
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <a href="index.html" class="site-logo" aria-label="Salt & Crème home" style="border-bottom: none;">
        <span class="seal" aria-hidden="true">S&amp;C</span>
        <span class="site-logo-text"><span class="logo-upright">salt&amp;</span><span class="logo-italic">crème</span></span>
      </a>
      <p class="site-footer-copy">Mountlake Terrace, WA &mdash; Made to order</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
